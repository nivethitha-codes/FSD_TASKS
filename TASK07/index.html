<!DOCTYPE html>
<html>
<head>
<title>Customer Feedback</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Customer Feedback Form</h1>

<form id="feedbackForm">

<label>Name</label>
<input type="text" id="name" onkeypress="validateName(event)" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Your Feedback</label>
<textarea id="feedback" maxlength="200" onkeyup="updateCounter()" required></textarea>

<div class="counter">
<span id="charCount">0</span>/200 characters
</div>

<label>Rate our service</label>

<div class="stars">

<input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
<input type="radio" name="rating" value="4.5" id="star4half"><label for="star4half">☆</label>
<input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
<input type="radio" name="rating" value="3.5" id="star3half"><label for="star3half">☆</label>
<input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
<input type="radio" name="rating" value="2.5" id="star2half"><label for="star2half">☆</label>
<input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
<input type="radio" name="rating" value="1.5" id="star1half"><label for="star1half">☆</label>
<input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>

</div>

<button type="button" ondblclick="submitFeedback()">Submit Feedback</button>

</form>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
